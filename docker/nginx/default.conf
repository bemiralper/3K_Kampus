# 3K Kampüs LMS — production reverse proxy (Docker)
# Host port 8080 → container 80 (mevcut host nginx ile çakışmayı önler)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream lms_frontend {
    server frontend:3000;
}

upstream lms_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # WhatsApp webhook — doğrudan Django
    location /api/communication/webhook/ {
        proxy_pass http://lms_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SSE — buffering kapalı
    location /api/communication/events/stream/ {
        proxy_pass http://lms_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://lms_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
