# 3K Kampüs LMS — Docker production
# Varsayılan: uygulama container'da, PostgreSQL host'ta (DB_HOST=host.docker.internal)
# All-in-one PG: docker compose -f docker-compose.prod.yml --profile bundled-db up -d
# Mevcut systemd deploy bu dosyadan etkilenmez.

name: lms-prod

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    restart: unless-stopped
    env_file:
      - .env.production.docker
    environment:
      DJANGO_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_prod:/app/backend/media
      - static_prod:/app/backend/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    restart: unless-stopped
    env_file:
      - .env.production.docker
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      # Host nginx (443) ile çakışmaması için 8080; cutover sonrası 80:80 yapılabilir
      - "${LMS_DOCKER_HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_prod:/var/www/static:ro
      - media_prod:/var/www/media:ro
    depends_on:
      - backend
      - frontend

  # Profile bundled-db: sunucuda ayrı PG yoksa
  db:
    profiles: ["bundled-db"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lms_db}
      POSTGRES_USER: ${DB_USER:-lms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required for bundled-db}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    profiles: ["workers"]
    image: redis:7-alpine
    restart: unless-stopped

  celery-worker:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    restart: unless-stopped
    env_file:
      - .env.production.docker
    environment:
      DJANGO_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_prod:/app/backend/media
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    depends_on:
      - backend
      - redis

volumes:
  media_prod:
  static_prod:
  pgdata_prod:
