<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="30" />
  <title>3K Kampüs — Güncelleme</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 45%, #0f172a 100%);
      color: #e2e8f0;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 36px 32px;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #93c5fd;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.35);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f8fafc;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 10px;
    }
    .hint {
      margin-top: 24px;
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 24px auto 0;
      border: 3px solid rgba(148, 163, 184, 0.25);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Bakım / Güncelleme</div>
    <h1>Sistem güncelleniyor</h1>
    <p>3K Kampüs şu anda kısa süreli bir güncelleme alıyor. Verileriniz güvendedir.</p>
    <p>Genellikle <strong>2–5 dakika</strong> sürer. Lütfen sayfayı biraz sonra yenileyin.</p>
    <div class="spinner" aria-hidden="true"></div>
    <p class="hint">Bu sayfa otomatik yenilenir. Sorun devam ederse kurum yöneticinize bildirin.</p>
  </div>
</body>
</html>
